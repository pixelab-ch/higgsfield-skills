<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="Syne, 'Trebuchet MS', Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="glowV" cx="15%" cy="18%" r="60%">
      <stop offset="0" stop-color="#7b61ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="90%" cy="88%" r="60%">
      <stop offset="0" stop-color="#c9a84c" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#0a0a0a"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glowV)"/>
  <rect width="1280" height="640" fill="url(#glowG)"/>
  <rect x="0" y="0" width="12" height="640" fill="url(#accent)"/>

  <!-- pixel motif (top-right) -->
  <g transform="translate(1040,90)">
    <rect x="0"  y="0"  width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="36" y="0"  width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="72" y="0"  width="26" height="26" rx="4" fill="#7b61ff"/>
    <rect x="0"  y="36" width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="36" y="36" width="26" height="26" rx="4" fill="#c9a84c"/>
    <rect x="72" y="36" width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="0"  y="72" width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="36" y="72" width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="72" y="72" width="26" height="26" rx="4" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
  </g>

  <!-- title block (vertically centered) -->
  <text x="90" y="300" font-size="96" font-weight="800" letter-spacing="-2" fill="#ffffff">Higgsfield <tspan fill="#c9a84c">Skills</tspan></text>
  <rect x="94" y="335" width="150" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="92" y="392" font-size="30" font-weight="500" fill="#b8b6b4" font-family="Inter, Arial, sans-serif">Model-aware Claude Agent Skills for AI image &amp; video generation</text>
  <text x="92" y="438" font-size="24" font-weight="600" letter-spacing="0.5" fill="#71706e" font-family="Inter, Arial, sans-serif">15 skills<tspan fill="#c9a84c">  ·  </tspan>~38 Higgsfield models<tspan fill="#c9a84c">  ·  </tspan>opt-in MCP generation</text>

  <!-- footer -->
  <rect x="90" y="540" width="1100" height="1" fill="#ffffff" fill-opacity="0.08"/>
  <text x="90" y="588" font-size="22" font-weight="700" letter-spacing="4" fill="#c9a84c" font-family="Inter, Arial, sans-serif">BUILT BY PIXELAB</text>
  <text x="380" y="588" font-size="21" font-weight="400" font-style="italic" fill="#71706e" font-family="Inter, Arial, sans-serif">« Un pixel peut tout changer »</text>
  <text x="1190" y="588" text-anchor="end" font-size="20" font-weight="600" fill="#b8b6b4" font-family="Inter, Arial, sans-serif">pixelab.ch</text>
</svg>
