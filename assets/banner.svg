<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>

    <!-- Accent gradient for elements -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Decorative grid lines (subtle) -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="400" />
    <line x1="1200" y1="0" x2="0" y2="400" />
  </g>

  <!-- Left side: Film strip decoration -->
  <g opacity="0.15">
    <!-- Film strip -->
    <rect x="30" y="50" width="40" height="300" fill="none" stroke="#ffffff" stroke-width="2" rx="3"/>
    <!-- Sprocket holes -->
    <circle cx="40" cy="70" r="3" fill="#ffffff"/>
    <circle cx="40" cy="100" r="3" fill="#ffffff"/>
    <circle cx="40" cy="130" r="3" fill="#ffffff"/>
    <circle cx="40" cy="160" r="3" fill="#ffffff"/>
    <circle cx="40" cy="190" r="3" fill="#ffffff"/>
    <circle cx="40" cy="220" r="3" fill="#ffffff"/>
    <circle cx="40" cy="250" r="3" fill="#ffffff"/>
    <circle cx="40" cy="280" r="3" fill="#ffffff"/>
    <circle cx="40" cy="310" r="3" fill="#ffffff"/>
    <circle cx="40" cy="340" r="3" fill="#ffffff"/>
  </g>

  <!-- Center content area -->
  <g>
    <!-- Main title -->
    <text x="600" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff" letter-spacing="-2">
      Seedance 2.0
    </text>

    <!-- Accent character -->
    <text x="630" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="300" text-anchor="middle" fill="#ec4899" letter-spacing="4">
      ×
    </text>

    <!-- Secondary title -->
    <text x="600" y="235" font-family="Arial, sans-serif" font-size="56" font-weight="600" text-anchor="middle" fill="#6366f1">
      Higgsfield
    </text>

    <!-- Subtitle line -->
    <line x1="350" y1="275" x2="850" y2="275" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

    <!-- Subtitle text (bilingual) -->
    <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="500" text-anchor="middle" fill="#e0e7ff">
      技能集 | 15 Prompt Engineering Skills
    </text>
  </g>

  <!-- Right side: Sparkle decorations -->
  <g opacity="0.25" fill="#ec4899">
    <!-- Sparkle 1 -->
    <circle cx="1100" cy="80" r="2"/>
    <line x1="1100" y1="70" x2="1100" y2="90" stroke="#ec4899" stroke-width="1"/>
    <line x1="1090" y1="80" x2="1110" y2="80" stroke="#ec4899" stroke-width="1"/>

    <!-- Sparkle 2 -->
    <circle cx="1050" cy="300" r="1.5"/>
    <line x1="1050" y1="292" x2="1050" y2="308" stroke="#ec4899" stroke-width="0.8"/>
    <line x1="1042" y1="300" x2="1058" y2="300" stroke="#ec4899" stroke-width="0.8"/>

    <!-- Sparkle 3 -->
    <circle cx="1130" cy="320" r="2"/>
    <line x1="1130" y1="308" x2="1130" y2="332" stroke="#ec4899" stroke-width="1"/>
    <line x1="1118" y1="320" x2="1142" y2="320" stroke="#ec4899" stroke-width="1"/>
  </g>

  <!-- Camera icon elements (stylized) -->
  <g opacity="0.12" fill="none" stroke="#ffffff" stroke-width="1.5">
    <!-- Camera lens -->
    <circle cx="100" cy="200" r="25" opacity="0.4"/>
    <circle cx="100" cy="200" r="18" opacity="0.5"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="380" width="1200" height="20" fill="url(#accentGradient)" opacity="0.3"/>
</svg>
