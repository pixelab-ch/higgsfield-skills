<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="Syne, 'Trebuchet MS', Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="glowV" cx="18%" cy="22%" r="55%">
      <stop offset="0" stop-color="#7b61ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="88%" cy="85%" r="55%">
      <stop offset="0" stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0a0a0a"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glowV)"/>
  <rect width="1200" height="400" fill="url(#glowG)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="10" height="400" fill="url(#accent)"/>

  <!-- pixel motif (top-right) — nod to "un pixel peut tout changer" -->
  <g transform="translate(980,70)">
    <rect x="0"  y="0"  width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="30" y="0"  width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="60" y="0"  width="22" height="22" rx="3" fill="#7b61ff"/>
    <rect x="0"  y="30" width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="30" y="30" width="22" height="22" rx="3" fill="#c9a84c"/>
    <rect x="60" y="30" width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="0"  y="60" width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="30" y="60" width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
    <rect x="60" y="60" width="22" height="22" rx="3" fill="none" stroke="#71706e" stroke-opacity="0.5"/>
  </g>

  <!-- title -->
  <text x="80" y="180" font-size="74" font-weight="800" letter-spacing="-1" fill="#ffffff">Higgsfield <tspan fill="#c9a84c">Skills</tspan></text>

  <!-- accent rule -->
  <rect x="84" y="205" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- subtitle -->
  <text x="82" y="250" font-size="22" font-weight="500" fill="#b8b6b4" font-family="Inter, Arial, sans-serif">Model-aware Claude Agent Skills for AI image &amp; video generation</text>

  <!-- meta row -->
  <text x="82" y="292" font-size="19" font-weight="600" letter-spacing="0.5" fill="#71706e" font-family="Inter, Arial, sans-serif">15 skills<tspan fill="#c9a84c">  ·  </tspan>~38 models<tspan fill="#c9a84c">  ·  </tspan>opt-in MCP generation<tspan fill="#c9a84c">  ·  </tspan>progressive disclosure</text>

  <!-- footer: built by pixelab + tagline -->
  <text x="82" y="355" font-size="17" font-weight="700" letter-spacing="3" fill="#c9a84c" font-family="Inter, Arial, sans-serif">BUILT BY PIXELAB</text>
  <text x="305" y="355" font-size="16" font-weight="400" font-style="italic" fill="#71706e" font-family="Inter, Arial, sans-serif">« Un pixel peut tout changer »</text>
</svg>
